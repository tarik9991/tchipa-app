# Nginx reverse proxy for the Tchipa backend.
#
# This file is the BARE HTTP version. `certbot --nginx` will edit it in-place
# to add the listen 443 / ssl_certificate blocks and an 80→443 redirect.
#
# Path on VPS: /etc/nginx/sites-available/tchipa-api.conf
# Enabled via symlink: /etc/nginx/sites-enabled/tchipa-api.conf

server {
    listen 80;
    listen [::]:80;
    server_name api.tchipa.co.uk;

    # Proxy everything to the PM2-managed Node.js process on :3000.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / keep-alive support (cheap to enable, no cost if unused).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # PayGate polling can take a few seconds; give a bit of headroom.
        proxy_read_timeout  90s;
        proxy_send_timeout  90s;
        proxy_connect_timeout 10s;

        # The backend handles its own JSON bodies; cap upload size so an
        # accidental large POST can't tie up workers.
        client_max_body_size 2m;
    }

    # Lightweight liveness probe — bypasses the proxy.
    location = /_nginx_health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
