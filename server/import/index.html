<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Import — Gemini Vision</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 1rem; padding: 2rem; width: 100%; max-width: 540px;
      box-shadow: 0 25px 50px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: .25rem; color: #f1f5f9; }
    p.sub { font-size: .85rem; color: #94a3b8; margin-bottom: 1.75rem; }
    label { display: block; font-size: .8rem; font-weight: 600; color: #94a3b8;
            letter-spacing: .05em; text-transform: uppercase; margin-bottom: .35rem; }
    input[type="text"], input[type="url"] {
      width: 100%; padding: .65rem .85rem; background: #0f172a;
      border: 1px solid #334155; border-radius: .5rem; color: #e2e8f0;
      font-size: .95rem; outline: none; transition: border-color .2s;
    }
    input:focus { border-color: #6366f1; }
    .file-zone {
      margin-top: 1.25rem; border: 2px dashed #334155; border-radius: .75rem;
      padding: 1.5rem; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; position: relative;
    }
    .file-zone:hover, .file-zone.drag { border-color: #6366f1; background: #1a2540; }
    .file-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-zone .icon { font-size: 2rem; margin-bottom: .5rem; }
    .file-zone .hint { font-size: .85rem; color: #64748b; }
    #preview { max-width: 100%; max-height: 220px; border-radius: .5rem;
               margin-top: 1rem; display: none; border: 1px solid #334155; }
    button[type="submit"] {
      margin-top: 1.5rem; width: 100%; padding: .75rem;
      background: #6366f1; border: none; border-radius: .5rem;
      color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: background .2s; display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    button[type="submit"]:hover { background: #4f46e5; }
    button[type="submit"]:disabled { background: #334155; cursor: not-allowed; }
    #result-box {
      margin-top: 1.5rem; display: none; background: #0f172a;
      border: 1px solid #334155; border-radius: .75rem; overflow: hidden;
    }
    #result-box .bar {
      background: #1e293b; padding: .5rem 1rem; display: flex;
      align-items: center; justify-content: space-between; border-bottom: 1px solid #334155;
      font-size: .8rem; font-weight: 600; color: #94a3b8;
    }
    #result-box .bar .status { color: #4ade80; }
    #result-box .bar .status.err { color: #f87171; }
    pre#result {
      padding: 1rem; font-size: .82rem; overflow-x: auto;
      white-space: pre-wrap; word-break: break-word; color: #a5f3fc;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <h1>Product Importer</h1>
  <p class="sub">Upload a product screenshot &mdash; Gemini Vision extracts name, variants &amp; price.</p>

  <form id="form" enctype="multipart/form-data">
    <div style="margin-bottom:1.25rem">
      <label for="url">Product URL (optional)</label>
      <input type="url" id="url" name="url" placeholder="https://example.com/product/..." />
    </div>

    <label>Screenshot</label>
    <div class="file-zone" id="drop-zone">
      <input type="file" name="screenshot" id="file" accept="image/*" required />
      <div class="icon">🖼️</div>
      <div>Drop image here or <strong>click to browse</strong></div>
      <div class="hint">PNG, JPG, WebP up to 10 MB</div>
    </div>
    <img id="preview" alt="Preview" />

    <button type="submit" id="btn">
      <span id="btn-label">Extract with Gemini</span>
    </button>
  </form>

  <div id="result-box">
    <div class="bar">
      <span>Result</span>
      <span class="status" id="status-label"></span>
    </div>
    <pre id="result"></pre>
  </div>
</div>

<script>
const form = document.getElementById('form');
const fileInput = document.getElementById('file');
const preview = document.getElementById('preview');
const btn = document.getElementById('btn');
const btnLabel = document.getElementById('btn-label');
const resultBox = document.getElementById('result-box');
const resultPre = document.getElementById('result');
const statusLabel = document.getElementById('status-label');
const dropZone = document.getElementById('drop-zone');

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (!f) return;
  preview.src = URL.createObjectURL(f);
  preview.style.display = 'block';
});

['dragover','dragenter'].forEach(ev => dropZone.addEventListener(ev, e => {
  e.preventDefault(); dropZone.classList.add('drag');
}));
['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, () => dropZone.classList.remove('drag')));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const dt = new DataTransfer();
  dt.items.add(f);
  fileInput.files = dt.files;
  preview.src = URL.createObjectURL(f);
  preview.style.display = 'block';
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  btn.disabled = true;
  btnLabel.innerHTML = '';
  const sp = document.createElement('div');
  sp.className = 'spinner';
  btn.appendChild(sp);
  btn.insertAdjacentText('beforeend', ' Analysing…');

  resultBox.style.display = 'none';

  try {
    const fd = new FormData(form);
    const res = await fetch('/import/extract', { method: 'POST', body: fd });
    const json = await res.json();
    resultBox.style.display = 'block';
    resultPre.textContent = JSON.stringify(json, null, 2);
    if (res.ok && !json.error) {
      statusLabel.textContent = '✓ OK';
      statusLabel.className = 'status';
    } else {
      statusLabel.textContent = '✗ Error';
      statusLabel.className = 'status err';
    }
  } catch (err) {
    resultBox.style.display = 'block';
    resultPre.textContent = String(err);
    statusLabel.textContent = '✗ Error';
    statusLabel.className = 'status err';
  } finally {
    btn.disabled = false;
    btn.querySelectorAll('.spinner, *').forEach(n => n.nodeType === 3 && n.remove());
    sp.remove();
    btnLabel.textContent = 'Extract with Gemini';
  }
});
</script>
</body>
</html>
